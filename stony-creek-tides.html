<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tides">
<title>Time and Tide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a1628;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }
  .app {
    display: flex;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* PIER IMAGE - left/center */
  .pier-bg {
    position: absolute;
    inset: 0;
    right: 52px;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
  }

  /* WATER OVERLAY */
  .water-overlay {
    position: absolute;
    left: 0;
    right: 52px;
    bottom: 0;
    pointer-events: none;
    transition: height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    overflow: hidden;
  }
  .water-surface {
    position: absolute;
    top: 0;
    left: -10px;
    right: -10px;
    height: 32px;
  }
  .water-surface svg {
    width: 100%;
    height: 100%;
  }
  .water-body {
    position: absolute;
    top: 28px;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg,
      rgba(20,80,140,0.72) 0%,
      rgba(10,30,70,0.85) 60%,
      rgba(5,15,40,0.92) 100%
    );
  }

  /* WAVE ANIMATION */
  @keyframes wave1 {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes wave2 {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }

  /* SCROLL TRACK - right side */
  .scroll-track {
    position: absolute;
    top: 0;
    right: 0;
    width: 52px;
    bottom: 0;
    background: rgba(5,15,35,0.88);
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: ns-resize;
    user-select: none;
    touch-action: none;
  }
  .scroll-inner {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .tick-marks {
    position: absolute;
    left: 0; right: 0; top: 0;
  }
  .tick {
    position: absolute;
    right: 0;
    display: flex;
    align-items: center;
    transform: translateY(-50%);
  }
  .tick-line {
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .tick.major .tick-line { width: 10px; background: rgba(255,255,255,0.25); }
  .tick-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    position: absolute;
    right: 13px;
    white-space: nowrap;
  }
  .tick.midnight .tick-label { color: #4fc3f7; font-weight: 500; }

  .scroll-thumb {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: #4fc3f7;
    box-shadow: 0 0 6px rgba(79,195,247,0.8);
    pointer-events: none;
    transform: translateY(-50%);
  }
  .scroll-thumb::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #4fc3f7;
    box-shadow: 0 0 8px rgba(79,195,247,0.9);
  }
  .scroll-now-dot {
    position: absolute;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,200,50,0.9);
    box-shadow: 0 0 6px rgba(255,200,50,0.7);
    pointer-events: none;
  }

  /* HEADER OVERLAY - sky area */
  .header {
    position: absolute;
    top: 0; left: 0; right: 52px;
    padding: 48px 16px 16px;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, transparent 100%);
  }
  .location {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  .tide-height-wrap {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .tide-height {
    font-family: 'DM Mono', monospace;
    font-size: 58px;
    font-weight: 300;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .tide-unit {
    font-size: 18px;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  .tide-meta {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .tide-dir {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #7dd3fc;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .tide-time-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .next-event {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* DATE PILLS */
  .date-bar {
    position: absolute;
    bottom: 0; left: 0; right: 52px;
    padding: 12px 16px 24px;
    display: flex;
    gap: 10px;
    background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
  }
  .date-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.15s;
  }
  .date-pill.active {
    color: #4fc3f7;
    background: rgba(79,195,247,0.15);
    border-color: rgba(79,195,247,0.4);
  }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0;
    background: #0a1628;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .loading-wave { display: flex; gap: 4px; }
  .loading-wave span {
    width: 4px; height: 20px;
    background: #4fc3f7;
    border-radius: 2px;
    animation: wv 1s ease-in-out infinite;
    opacity: 0.6;
  }
  .loading-wave span:nth-child(2) { animation-delay: 0.1s; }
  .loading-wave span:nth-child(3) { animation-delay: 0.2s; }
  .loading-wave span:nth-child(4) { animation-delay: 0.3s; }
  .loading-wave span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wv {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="loading-text" id="loading-text">fetching tides</div>
</div>

<div class="app">
  <!-- Pier background image -->
  <div class="pier-bg" id="pier-bg"></div>

  <!-- Water overlay -->
  <div class="water-overlay" id="water-overlay" style="height:0%">
    <div class="water-surface">
      <svg viewBox="0 0 400 32" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(79,195,247,0.25)"/>
            <stop offset="100%" stop-color="rgba(20,80,140,0)"/>
          </linearGradient>
        </defs>
        <!-- wave 1 -->
        <path id="wave-path-1" fill="rgba(79,195,247,0.18)" style="animation: wave1 3.5s linear infinite">
          <animate attributeName="d"
            dur="3.5s"
            repeatCount="indefinite"
            values="
              M0,18 C40,8 80,28 120,18 C160,8 200,28 240,18 C280,8 320,28 360,18 C380,12 400,20 400,18 L400,32 L0,32 Z;
              M0,20 C40,28 80,10 120,20 C160,28 200,10 240,20 C280,28 320,10 360,20 C380,24 400,16 400,20 L400,32 L0,32 Z;
              M0,18 C40,8 80,28 120,18 C160,8 200,28 240,18 C280,8 320,28 360,18 C380,12 400,20 400,18 L400,32 L0,32 Z
            "/>
        </path>
        <!-- wave 2 -->
        <path fill="rgba(30,100,180,0.22)" style="animation: wave2 5s linear infinite">
          <animate attributeName="d"
            dur="5s"
            repeatCount="indefinite"
            values="
              M0,22 C50,14 100,26 150,22 C200,14 250,26 300,22 C350,14 400,22 400,22 L400,32 L0,32 Z;
              M0,16 C50,24 100,12 150,16 C200,24 250,12 300,16 C350,24 400,16 400,16 L400,32 L0,32 Z;
              M0,22 C50,14 100,26 150,22 C200,14 250,26 300,22 C350,14 400,22 400,22 L400,32 L0,32 Z
            "/>
        </path>
      </svg>
    </div>
    <div class="water-body"></div>
  </div>

  <!-- Header overlay -->
  <header class="header">
    <div class="location">Stony Creek · Branford CT</div>
    <div class="tide-height-wrap">
      <div class="tide-height" id="height-display">—</div>
      <div class="tide-unit">ft</div>
    </div>
    <div class="tide-meta">
      <div class="tide-dir" id="direction-display">—</div>
      <div class="tide-time-label" id="time-display">—</div>
    </div>
    <div class="next-event" id="next-event-display">—</div>
  </header>

  <!-- Scroll track -->
  <div class="scroll-track" id="scroll-track">
    <div class="scroll-inner" id="scroll-inner">
      <div class="tick-marks" id="tick-marks"></div>
      <div class="scroll-thumb" id="scroll-thumb" style="top:0"></div>
      <div class="scroll-now-dot" id="now-dot"></div>
    </div>
  </div>

  <!-- Date bar -->
  <div class="date-bar">
    <div class="date-pill active" id="pill-0" onclick="jumpToDay(0)">Today</div>
    <div class="date-pill" id="pill-1" onclick="jumpToDay(1)">Tomorrow</div>
    <div class="date-pill" id="pill-2" onclick="jumpToDay(2)"></div>
  </div>
</div>

// ---- TIDE RANGE FOR WATER HEIGHT MAPPING ----
// These will be set from actual data
let tideMin = 0, tideMax = 7;

// Percentage of screen the water covers at min/max tide
// At low tide (~0ft): water covers ~8% of screen height
// At high tide (~6.5ft): water covers ~60% of screen height
const WATER_PCT_MIN = 8;
const WATER_PCT_MAX = 62;

// ---- STATE ----
let tideData = [];
let hiloData = [];
let startTime = null;
let currentMinuteOffset = 0;
let isDragging = false;
let dragStartY = 0;
let dragStartOffset = 0;
let trackHeight = 0;
let offset = 0;

function getStartTime() {
  const now = new Date();
  now.setMinutes(0,0,0);
  now.setHours(now.getHours() - 2);
  return now;
}

function fmt12(h, m) {
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}
function fmtDate(d) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

async function fetchTideData() {
  const now = new Date();
  const dates = [];
  for (let i = -1; i <= 3; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    dates.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
  }
  const begin = dates[0], end = dates[dates.length-1];
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date=${begin}&end_date=${end}&station=${STATION}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=6&units=english&application=stony_creek_tides&format=json`;
  const r = await fetch(url);
  const j = await r.json();
  if (!j.predictions) throw new Error('No data');
  return j.predictions.map(p => {
    const [datePart, timePart] = p.t.split(' ');
    const [yr, mo, dy] = datePart.split('-').map(Number);
    const [hh, mm] = timePart.split(':').map(Number);
    return { date: new Date(yr, mo-1, dy, hh, mm, 0), v: parseFloat(p.v) };
  });
}

async function fetchHiLos() {
  const now = new Date();
  const dates = [];
  for (let i = -1; i <= 3; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    dates.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
  }
  const begin = dates[0], end = dates[dates.length-1];
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date=${begin}&end_date=${end}&station=${STATION}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=stony_creek_tides&format=json`;
  const r = await fetch(url);
  const j = await r.json();
  if (!j.predictions) return [];
  return j.predictions.map(p => {
    const [datePart, timePart] = p.t.split(' ');
    const [yr, mo, dy] = datePart.split('-').map(Number);
    const [hh, mm] = timePart.split(':').map(Number);
    return { date: new Date(yr, mo-1, dy, hh, mm, 0), v: parseFloat(p.v), type: p.type };
  });
}

function getHeightAtTime(targetDate) {
  if (!tideData.length) return null;
  const t = targetDate.getTime();
  let lo = 0, hi = tideData.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (tideData[mid].date.getTime() <= t) lo = mid; else hi = mid;
  }
  const a = tideData[lo], b = tideData[hi];
  if (!b) return a.v;
  const frac = (t - a.date.getTime()) / (b.date.getTime() - a.date.getTime());
  return a.v + (b.v - a.v) * frac;
}

function getTrend(targetDate) {
  const t1 = getHeightAtTime(new Date(targetDate.getTime() - 20*60000));
  const t2 = getHeightAtTime(new Date(targetDate.getTime() + 20*60000));
  if (t1 === null || t2 === null) return '';
  return t2 > t1 ? '↑ Rising' : '↓ Falling';
}

function getNextEvent(targetDate) {
  const t = targetDate.getTime();
  const future = hiloData.filter(h => h.date.getTime() > t);
  if (!future.length) return '';
  const next = future[0];
  const diffMin = Math.round((next.date.getTime() - t) / 60000);
  const hrs = Math.floor(diffMin / 60);
  const mins = diffMin % 60;
  const label = next.type === 'H' ? 'High' : 'Low';
  const timeStr = fmt12(next.date.getHours(), next.date.getMinutes());
  const diffStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
  return `${label} ${next.v.toFixed(1)}ft at ${timeStr} · in ${diffStr}`;
}

function tideToWaterPct(height) {
  const range = tideMax - tideMin || 1;
  const frac = Math.max(0, Math.min(1, (height - tideMin) / range));
  return WATER_PCT_MIN + frac * (WATER_PCT_MAX - WATER_PCT_MIN);
}

function updateWaterOverlay(height) {
  const pct = tideToWaterPct(height);
  document.getElementById('water-overlay').style.height = pct + '%';
}

function buildTickMarks() {
  const container = document.getElementById('tick-marks');
  container.innerHTML = '';
  const totalMinutes = TOTAL_HOURS * 60;
  const totalPx = totalMinutes / 4; // 4 min per px
  container.style.height = totalPx + 'px';
  for (let m = 0; m <= totalMinutes; m += 60) {
    const date = new Date(startTime.getTime() + m * 60000);
    const isMidnight = date.getHours() === 0;
    const tick = document.createElement('div');
    tick.className = 'tick major' + (isMidnight ? ' midnight' : '');
    tick.style.top = (m / 4) + 'px';
    const line = document.createElement('div');
    line.className = 'tick-line';
    tick.appendChild(line);
    const label = document.createElement('div');
    label.className = 'tick-label';
    label.textContent = isMidnight
      ? fmtDate(date).slice(0,3).toUpperCase()
      : fmt12(date.getHours(), 0).replace(' AM','a').replace(' PM','p');
    tick.appendChild(label);
    container.appendChild(tick);
  }
}

function updateThumb() {
  const track = document.getElementById('scroll-track');
  trackHeight = track.offsetHeight;
  const totalMinutes = TOTAL_HOURS * 60;
  const scrollRatio = currentMinuteOffset / totalMinutes;
  const thumbTop = scrollRatio * trackHeight;
  document.getElementById('scroll-thumb').style.top = thumbTop + 'px';

  const now = new Date();
  const nowMinutes = (now.getTime() - startTime.getTime()) / 60000;
  const nowRatio = Math.max(0, Math.min(1, nowMinutes / totalMinutes));
  document.getElementById('now-dot').style.top = (nowRatio * trackHeight) + 'px';
}

function updateHeader() {
  const displayDate = new Date(startTime.getTime() + currentMinuteOffset * 60000);
  const h = getHeightAtTime(displayDate);
  document.getElementById('height-display').textContent = h !== null ? h.toFixed(1) : '—';
  document.getElementById('direction-display').textContent = getTrend(displayDate);
  document.getElementById('time-display').textContent = fmt12(displayDate.getHours(), displayDate.getMinutes()) + ' · ' + fmtDate(displayDate);
  document.getElementById('next-event-display').textContent = getNextEvent(displayDate);
  if (h !== null) updateWaterOverlay(h);
}

function updateDatePills() {
  const displayDate = new Date(startTime.getTime() + currentMinuteOffset * 60000);
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const day2 = new Date(today); day2.setDate(day2.getDate()+2);
  const dDate = new Date(displayDate); dDate.setHours(0,0,0,0);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('pill-2').textContent = days[day2.getDay()];
  ['pill-0','pill-1','pill-2'].forEach((id, i) => {
    const ref = [today, tomorrow, day2][i];
    document.getElementById(id).classList.toggle('active', dDate.getTime() === ref.getTime());
  });
}

function update() {
  updateHeader();
  updateThumb();
  updateDatePills();
}

function jumpToDay(dayOffset) {
  const now = new Date();
  const target = new Date(now);
  target.setDate(target.getDate() + dayOffset);
  target.setHours(dayOffset === 0 ? now.getHours() : 8, dayOffset === 0 ? now.getMinutes() : 0, 0, 0);
  const minutes = (target.getTime() - startTime.getTime()) / 60000;
  currentMinuteOffset = Math.max(0, Math.min(TOTAL_HOURS * 60, minutes));
  update();
}

// Scroll interactions
const track = document.getElementById('scroll-track');
function getTrackY(e) {
  const rect = track.getBoundingClientRect();
  return (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
}
function onDragStart(e) {
  isDragging = true;
  dragStartY = getTrackY(e);
  dragStartOffset = currentMinuteOffset;
  e.preventDefault();
}
function onDragMove(e) {
  if (!isDragging) return;
  const dy = getTrackY(e) - dragStartY;
  const minuteDelta = (dy / trackHeight) * TOTAL_HOURS * 60;
  currentMinuteOffset = Math.max(0, Math.min(TOTAL_HOURS * 60, dragStartOffset + minuteDelta));
  update();
  e.preventDefault();
}
function onDragEnd() { isDragging = false; }

track.addEventListener('mousedown', onDragStart);
track.addEventListener('touchstart', onDragStart, { passive: false });
document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchend', onDragEnd);
window.addEventListener('resize', () => { update(); });
